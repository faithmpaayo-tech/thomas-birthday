
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dad 🎉</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #3b0000, #000);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 3em;
    animation: fadeIn 2s ease-in;
}

p {
    font-size: 1.2em;
    max-width: 600px;
    margin: auto;
}

img {
    width: 250px;
    border-radius: 15px;
    margin: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

iframe {
    margin-top: 20px;
    border-radius: 10px;
}

footer {
    margin-top: 40px;
    opacity: 0.7;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday Dad 🎂</h1>

    <p>
        Today we celebrate not just your birthday, but the amazing person you are. 
        Thank you for your love, strength, and guidance. You mean so much.
    </p>

    <img src="dad.jpg" alt="Dad's Photo">

    <p>
        May this year bring you happiness, good health, and endless blessings. 
        You deserve the best today and always.
    </p>

    <iframe width="300" height="170"
        src="https://www.youtube.com/God bless you and keep you"
        frameborder="0" allowfullscreen>
    </iframe>

    <footer>
        <p>Made with love ❤️</p>
    </footer>
</div>

</body>
</html>
